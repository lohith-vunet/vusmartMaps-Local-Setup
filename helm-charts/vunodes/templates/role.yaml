apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.serviceAccount.roleName }}
rules:
- apiGroups: ["coordination.k8s.io"]
  resources:
  - leases
  verbs: ["get", "create", "update"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
  - rolebindings
  - roles
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["traefik.io", "traefik.containo.us"]
  resources:
  - middlewares
  - ingressroutes
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources:
  - serviceaccounts
  - services
  - namespaces
  - pods
  - events
  - deployments
  - nodes
  - nodes/stats
  - nodes/metrics
  - replicasets
  - pods/log
  - secrets
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Enable this rule only if planing to use Kubernetes keystore
#- apiGroups: [""]
#  resources:
#  - secrets
#  verbs: ["get"]
- apiGroups: ["extensions"]
  resources:
  - replicasets
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources:
  - statefulsets
  - deployments
  - replicasets
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources:
  - jobs
  # Uncomment if need metadata for cronjob objects in versions >= v1.21
  #- cronjobs
  verbs: ["get", "list", "watch"]
