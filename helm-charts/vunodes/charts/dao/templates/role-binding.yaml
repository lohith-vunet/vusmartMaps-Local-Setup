apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{  .Values.serviceAccount.roleBindName  }}
subjects:
- kind: ServiceAccount
  name: {{  .Values.serviceAccount.name }}
roleRef:
  kind: Role
  name: {{  .Values.serviceAccount.roleName }}
  apiGroup: rbac.authorization.k8s.io
