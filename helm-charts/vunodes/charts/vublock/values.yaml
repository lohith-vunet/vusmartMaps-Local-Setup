# vulauncher will update this section while deployment
vunet:
  imageServer: &imageServer ghcr.io
    #imageServer: &imageServer vunet-registry:5000
  imageName: &imageName vunetsystems/cairo
  imageTag: &imageTag 2.16.901
    #imageTag: &imageTag 2.16.901
  imagePullSecrets:
    - name: ghcr-login-secret
  cairo:
    image:
      pullPolicy: IfNotPresent
  # cpu and memory min and max values
  resources: &resources
    limits:
      cpu: "0.5"
      memory: 2Gi
    requests:
      cpu: "0.3"
      memory: 500Mi
  # priority node labels
  nodeAffinity: &nodeAffinity {}
  # tolerations
  tolerations: &tolerations []
  # number of pods to run
  replicas: &replicas 1
  # pvc size that will be claimed. For vuinterface we will use default section. All others
  # will be zero value
  hot:
    size: &hotSize ""
    enabled: &hotEnabled false
    encrypted: &hotEncrypted false
    storageclass: &hotStorageClass ""
  warm:
    size: &warmSize ""
    enabled: &warmEnabled false
    encrypted: &warmEncrypted false
    storageclass: &warmStorageClass ""
  cold:
    size: &coldSize ""
    enabled: &coldEnabled false
    encrypted: &coldEncrypted false
    storageclass: &coldStorageClass ""
  default:
    size: &defaultSize ""
    enabled: &defaultEnabled false
    encrypted: &defaultEncrypted false
    storageclass: &defaultStorageClass ""
  default-replica:
    size: &defaultReplicaSize ""
    enabled: &defaultReplicaEnabled false
    encrypted: &defaultReplicaEncrypted false
    storageclass: &defaultReplicaStorageClass ""
  host:
    size: &hostSize ""
    enabled: &hostEnabled false
    encrypted: &hostEncrypted false
    storageclass: &hostStorageClass ""
  # ghcr credentials
  pullSecretName: &pullSecretName ghcr-login-secret
  # loadbalancer IP information
  loadbalancer: &loadbalancer []
fullnameOverride: 'vublock'
securityContext:
  privileged: true
  allowPrivilegeEscalation: true # Prevent privilege escalation
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
serviceAccount:
  create: true
  name: vublock
  automountServiceAccountToken: false
posthook:
  repository: *imageServer
  imageName: vunetsystems/kubectl
  imageTag: v2.15.0
global:
  extraEnvVars: []
vublock:
  podAntiAffinityPreset: ""
  # image pull secrets
  imagePullSecrets:
    - name: *pullSecretName
  repository: *imageServer
  pullPolicy: IfNotPresent
  name: *imageName
  tag: *imageTag
  securityContext:
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000
  # replicas
  replicas: *replicas
  # tolerations
  tolerations: *tolerations
  # resources information
  resources: *resources
  # node affinity rules
  affinity:
    nodeAffinity: *nodeAffinity
  volumeClaims:
    vsmapsLogs:
      requests:
        storage: *defaultSize
  celery:
    vublock-configuration:
      enable: true
      autoscale: "5,1"
    vublock-diagnostic:
      enable: false
      autoscale: "5,1"
  services:
    vublock-configuration:
      enable: true
    vublock-diagnostic:
      enable: false
  args:
    - /bin/bash
    - -c
    - "tools/vunode.bash /home/vunet/workspace/cairo /home/vunet/workspace/cairo/configs/vunode_config.yml vublock start"
kubernetesClusterDomain: cluster.local
pvMapping: {}
kubectlResources:
  requests:
    cpu: "50m"
    memory: "100Mi"
  limits:
    cpu: "100m"
    memory: "200Mi"
