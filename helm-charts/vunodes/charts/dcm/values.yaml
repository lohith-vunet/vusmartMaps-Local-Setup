# vulauncher will update this section while deployment
vunet:
  imageServer: &imageServer ghcr.io
  imageName: &imageName vunetsystems/cairo
  imageTag: &imageTag 2.16-alert-disable-fix
  imagePullSecrets:
    - name: ghcr-login-secret
  # cpu and memory min and max values
  resources: &resources
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: "0.5"
      memory: 500Mi
  # priority node labels
  nodeAffinity: &nodeAffinity
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        preference:
          matchExpressions:
            - key: core-services-optimised
              operator: In
              values:
                - "True"
  # tolerations
  tolerations: &tolerations
    - key: core-services-optimised
      value: "True"
      operator: Equal
      effect: NoSchedule
  # number of pods to run
  replicas: &replicas 0
  # pvc details
  hot:
    size: &hotSize ""
    enabled: &hotEnabled false
    encrypted: &hotEncrypted false
    storageclass: &hotStorageClass ""
  warm:
    size: &warmSize ""
    enabled: &warmEnabled false
    encrypted: &warmEncrypted false
    storageclass: &warmStorageClass ""
  cold:
    size: &coldSize ""
    enabled: &coldEnabled false
    encrypted: &coldEncrypted false
    storageclass: &coldStorageClass ""
  default:
    size: &defaultSize 2Gi
    enabled: &defaultEnabled true
    encrypted: &defaultEncrypted false
    storageclass: &defaultStorageClass ""
  default-replica:
    size: &defaultReplicaSize 2Gi
    enabled: &defaultReplicaEnabled true
    encrypted: &defaultReplicaEncrypted false
    storageclass: &defaultReplicaStorageClass ""
  host:
    size: &hostSize 2Gi
    enabled: &hostEnabled true
    encrypted: &hostEncrypted false
    storageclass: &hostStorageClass ""
  # ghcr credentials
  pullSecretName: &pullSecretName ghcr-login-secret
  # loadbalancer IP information
  loadbalancer: &loadbalancer []
fullnameOverride: 'dcm'
securityContext:
  privileged: false
  allowPrivilegeEscalation: false  # Prevent privilege escalation
  capabilities:
      drop: ["ALL"]
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
serviceAccount:
  create: true
  name: dcm
  automountServiceAccountToken: false
posthook:
  repository: *imageServer
  imageName: vunetsystems/kubectl
  imageTag: v2.15.0
global:
  extraEnvVars: []
dcm:
  replicas: *replicas
  securityContext:
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000
  imagePullSecrets:
    - name: *pullSecretName
  pullPolicy: IfNotPresent
  repository: *imageServer
  name: *imageName
  tag: *imageTag
  tolerations: *tolerations
  resources: *resources
  podAntiAffinityPreset: ""
  affinity:
    nodeAffinity: *nodeAffinity
  volumeClaims:
    vsmapsLogs:
      requests:
        storage: *defaultSize
  args:
  - /bin/bash
  - -c
  - "tools/vunode.bash /home/vunet/workspace/cairo /home/vunet/workspace/cairo/configs/vunode_config.yml dcm start"

kubernetesClusterDomain: cluster.local

kubectlResources:
  requests:
    cpu: "50m"
    memory: "100Mi"
  limits:
    cpu: "100m"
    memory: "200Mi"
