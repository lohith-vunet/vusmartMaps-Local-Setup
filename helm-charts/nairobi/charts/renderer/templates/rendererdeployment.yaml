apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.name }}
  labels:
    organization: vunet
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: renderer
      organization: vunet
  template:
    metadata:
      labels:
        organization: vunet
        app: renderer
      {{- with .Values.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccount.name  }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}  #Disable SA token auto-mount
      {{- if .Values.podSecurityContext }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity: {{- include "common.affinities.pods" (dict "type" .Values.deployment.renderer.podAntiAffinityPreset "component" "grafana" "context" $) | nindent 10 }}
        {{- with .Values.deployment.affinity.nodeAffinity }}
        nodeAffinity:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      containers:
        - name: renderer
          image: {{ .Values.deployment.image.repository }}/{{ .Values.deployment.image.name }}:{{ .Values.deployment.image.tag }}
          imagePullPolicy: {{ .Values.deployment.image.pullPolicy }}
          {{- if .Values.securityContext }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.rendererservice.port }}
              name: http          
          env:
            - name: RENDERING_REPORTER_URL
              value: {{ .Values.deployment.env.RENDERING_REPORTER_URL | quote }}
            - name: RENDERING_MODE
              value: {{ .Values.deployment.env.RENDERING_MODE | quote }}
            - name: IGNORE_HTTPS_ERRORS
              value: {{ .Values.deployment.env.IGNORE_HTTPS_ERRORS | quote }}
            - name: GF_PLUGIN_RENDERING_VIEWPORT_MAX_HEIGHT
              value: {{ .Values.deployment.env.GF_PLUGIN_RENDERING_VIEWPORT_MAX_HEIGHT | quote }}
          resources:
            {{- toYaml .Values.deployment.resources | nindent 12 }}
          {{- if .Values.securityContext.readOnlyRootFilesystem }}
          volumeMounts:
            - name: tmp-storage
              mountPath: /tmp
          {{- end }}
      {{- if .Values.securityContext.readOnlyRootFilesystem }}
      volumes:
        - name: tmp-storage
          emptyDir: {}
      {{- end }}
      restartPolicy: {{ .Values.deployment.restartPolicy }}
  strategy:
    type: {{ .Values.deployment.strategy.type }}
    rollingUpdate:
      maxSurge: {{ .Values.deployment.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.deployment.strategy.rollingUpdate.maxUnavailable }}

