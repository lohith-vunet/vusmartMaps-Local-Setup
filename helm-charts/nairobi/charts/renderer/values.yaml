# vulauncher will update this section while deployment
vunet:
  imageServer: &imageServer ghcr.io
  imageName: &imageName vunetsystems/grafana-renderer
  imageTag: &imageTag b46
  # cpu and memory min and max values
  resources: &resources
    limits:
      cpu: "3"
      memory: 2Gi
    requests:
      cpu: "0.3"
      memory: 500Mi
  # priority node labels
  nodeAffinity: &nodeAffinity {}
  # tolerations
  tolerations: &tolerations []
  # number of pods to run
  replicas: &replicas 1
  # pvc size that will be claimed. For nairobi, we will use default storage
  # others will have zero values.
  hot:
    size: &hotSize ""
    enabled: &hotEnabled false
    encrypted: &hotEncrypted false
    storageclass: &hotStorageClass ""
  warm:
    size: &warmSize ""
    enabled: &warmEnabled false
    encrypted: &warmEncrypted false
    storageclass: &warmStorageClass ""
  cold:
    size: &coldSize ""
    enabled: &coldEnabled false
    encrypted: &coldEncrypted false
    storageclass: &coldStorageClass ""
  default:
    size: &defaultSize ""
    enabled: &defaultEnabled false
    encrypted: &defaultEncrypted false
    storageclass: &defaultStorageClass ""
  default-replica:
    size: &defaultReplicaSize ""
    enabled: &defaultReplicaEnabled false
    encrypted: &defaultReplicaEncrypted false
    storageclass: &defaultReplicaStorageClass ""
  host:
    size: &hostSize ""
    enabled: &hostEnabled false
    encrypted: &hostEncrypted false
    storageclass: &hostStorageClass ""
  # ghcr credentials
  pullSecretName: &pullSecretName ghcr-login-secret
  # loadbalancer IP information
  loadbalancer: &loadbalancer []
  #
  # dependencies will be list of helm chart path, which would be required for the current
  # chart. We will install its dependant helm charts first, then current helm chart
  # will be installed
  dependencies: []
securityContext:
  privileged: false
  allowPrivilegeEscalation: false # Prevent privilege escalation
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
serviceAccount:
  create: true
  name: renderer
  automountServiceAccountToken: false
annotations:
  apparmor.security.beta.kubernetes.io/pod: runtime/default
rendererservice:
  name: renderer
  port: 8081
  targetPort: 8081
  appLabel: renderer
imagePullSecrets:
  - name: *pullSecretName
deployment:
  name: renderer
  replicas: *replicas
  tolerations: *tolerations
  affinity:
    nodeAffinity: *nodeAffinity
  resources: *resources
  image:
    repository: *imageServer
    name: *imageName
    tag: *imageTag
    pullPolicy: IfNotPresent
  env:
    RENDERING_REPORTER_URL: "http://reporter:8686"
    RENDERING_MODE: "reusable"
    IGNORE_HTTPS_ERRORS: "true"
    GF_PLUGIN_RENDERING_VIEWPORT_MAX_HEIGHT: "6000"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  restartPolicy: Always
  renderer:
    podAntiAffinityPreset: soft
    nodeAffinityPreset:
      type: required
      key: kubernetes.io/hostname
      values:
        - "node1"
        - "node2"
    resources:
      limits:
        cpu: "4000m"
        memory: "16Gi"
      requests:
        cpu: "1000m"
        memory: "512Mi"
