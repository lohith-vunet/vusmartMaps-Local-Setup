
{{- if  .Values.ingressRoute.dashboard.enableMiddleware }}

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  {{- with (index .Values.ingressRoute.dashboard.middlewares 0) }}
  name: {{ .name }}
  {{- end }}
  namespace: {{ template "traefik.namespace" . }}
  labels:
    {{- include "traefik.labels" . | nindent 4 }}
    {{- with .Values.deployment.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  basicAuth:
    secret: {{ .Values.secret.auth.name }}

{{- end }}
