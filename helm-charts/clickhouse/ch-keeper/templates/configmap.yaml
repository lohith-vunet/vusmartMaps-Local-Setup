# Setup ClickHouse Keeper settings
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clickhouse-keeper.fullname" . }}-settings
data:
  keeper_config.xml: |
    <clickhouse>
        <include_from>/tmp/clickhouse-keeper/config.d/generated-keeper-settings.xml</include_from>
        <logger>
            <level>error</level>
            <console>true</console>
        </logger>
        <listen_host>0.0.0.0</listen_host>
        <keeper_server incl="keeper_server">
            <path>/var/lib/clickhouse-keeper</path>
            {{- if .Values.secure }}
            <tcp_port_secure>2181</tcp_port_secure>
            {{- else }}
            <tcp_port>2181</tcp_port>
            {{- end }}
            <four_letter_word_white_list>*</four_letter_word_white_list>
            <enable_ipv6>false</enable_ipv6>
            <coordination_settings>
                <!-- <raft_logs_level>trace</raft_logs_level> -->
                <async_replication>true</async_replication>
                <raft_logs_level>information</raft_logs_level>
            </coordination_settings>
        </keeper_server>
        {{- if .Values.secure }}
        <openSSL>
          <server>
              <certificateFile>/etc/clickhouse-keeper/secrets.d/server.crt</certificateFile>
              <privateKeyFile>/etc/clickhouse-keeper/secrets.d/server.key</privateKeyFile>
              <caConfig>/etc/clickhouse-keeper/secrets.d/rootCA.crt</caConfig>
              <verificationMode>none</verificationMode>
              <loadDefaultCAFile>false</loadDefaultCAFile>
              <cacheSessions>true</cacheSessions>
              <disableProtocols>sslv2,sslv3</disableProtocols>
              <preferServerCiphers>true</preferServerCiphers>
              <invalidCertificateHandler>
                  <name>RejectCertificateHandler</name>
              </invalidCertificateHandler>
          </server>
        </openSSL>
        {{- end }}
        <prometheus>
            <endpoint>/metrics</endpoint>
            <port>7000</port>
            <metrics>true</metrics>
            <events>true</events>
            <asynchronous_metrics>true</asynchronous_metrics>
            <!-- https://github.com/ClickHouse/ClickHouse/issues/46136 -->
            <status_info>false</status_info>
        </prometheus>
    </clickhouse>

