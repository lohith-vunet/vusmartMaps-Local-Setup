apiVersion: batch/v1
kind: Job
metadata:
  name: "create-database"
  labels:
    app.kubernetes.io/managed-by: "Helm"
    app.kubernetes.io/instance: "release-name"
    app.kubernetes.io/version: "1.16.0"
    helm.sh/chart: "clikchouse-db-1.16.0"
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: "create-database"
      labels:
        app.kubernetes.io/managed-by: "Helm"
        app.kubernetes.io/instance: "release-name"
        helm.sh/chart: "clikchouse-db-1.16.0"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
{{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
{{- end }}
    {{- if .Values.podSecurityContext }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
    {{- end }}
      containers:
      - name: post-install-job
        {{- if .Values.securityContext }}
        securityContext: {{- toYaml .Values.securityContext | nindent 14 }}
        {{- end }}
        env:
        - name: CLICKHOUSE_DBS
          value: "vusmart monitoring"
        image: {{ .Values.image.repository }}/{{ .Values.image.name }}:{{ .Values.image.tag | default .Chart.AppVersion }}
        imagePullPolicy: "IfNotPresent"
        command: ["/bin/bash", "-c", "--"]
        args: ["sleep 60; /home/create-database.sh"]
        volumeMounts:
          - name: create-database
            mountPath: /home/create-database.sh
            subPath: create-database.sh
      volumes:
      - name: create-database
        configMap:
          name: create-dbs
          defaultMode: 0777
