{{- if .Capabilities.APIVersions.Has "apps/v1" }}
apiVersion: apps/v1
{{- else }}
apiVersion: apps/v1beta1
{{- end }}
kind: StatefulSet
metadata:
  name: {{ template "cp-zookeeper.fullname" . }}
  labels:
    organization: vunet
    app: {{ template "cp-zookeeper.name" . }}
    chart: {{ template "cp-zookeeper.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  {{- if .Capabilities.APIVersions.Has "apps/v1" }}
  selector:
    matchLabels:
      organization: vunet
      app: {{ template "cp-zookeeper.name" . }}
      release: {{ .Release.Name }}
  {{- end }}
  serviceName: {{ template "cp-zookeeper.fullname" . }}-headless
  podManagementPolicy: {{ .Values.podManagementPolicy }}
  replicas: {{ default 3 .Values.servers }}
  updateStrategy:
    type: {{ .Values.updateStrategy }}
  template:
    metadata:
      labels:
        organization: vunet
        app: {{ template "cp-zookeeper.name" . }}
        release: {{ .Release.Name }}
      {{- if or .Values.podAnnotations .Values.prometheus.jmx.enabled }}
      annotations:
      {{- range $key, $value := .Values.podAnnotations }}
        {{ $key }}: {{ $value | quote }}
      {{- end }}
      {{- if .Values.prometheus.jmx.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.prometheus.jmx.port | quote }}
      {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name  }}
      automountServiceAccountToken: false  #Disable SA token auto-mount  
      {{- if .Values.podSecurityContext }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.affinity }}
        {{- include "common.tplvalues.render" (dict "value" .Values.affinity "context" $) | nindent 8 }}
        {{- else }}
        nodeAffinity: {{- include "common.affinities.nodes" (dict "type" .Values.nodeAffinityPreset.type "key" .Values.nodeAffinityPreset.key "values" .Values.nodeAffinityPreset.values) | nindent 10 }}
        {{- end }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: "app"
                    operator: In
                    values:
                    - {{ template "cp-zookeeper.name" . }}
                  - key: "release"
                    operator: In
                    values:
                    - {{ .Release.Name }}
              topologyKey: "kubernetes.io/hostname"
      containers:
      {{- if .Values.prometheus.jmx.enabled }}
      - name: prometheus-jmx-exporter
        image: "{{ .Values.prometheus.jmx.image }}:{{ .Values.prometheus.jmx.imageTag }}"
        imagePullPolicy: "{{ .Values.prometheus.jmx.imagePullPolicy }}"
        {{- if .Values.securityContext }}
        securityContext: {{- toYaml .Values.securityContext | nindent 10 }}
        {{- end }}
        command:
        - java
        - -XX:+UnlockExperimentalVMOptions
        - -XX:+UseCGroupMemoryLimitForHeap
        - -XX:MaxRAMFraction=1
        - -XshowSettings:vm
        - -jar
        - jmx_prometheus_httpserver.jar
        - {{ .Values.prometheus.jmx.port | quote }}
        - /etc/jmx-zookeeper/jmx-zookeeper-prometheus.yml
        ports:
        - containerPort: {{ .Values.prometheus.jmx.port }}
        resources:
{{ toYaml .Values.prometheus.jmx.resources | indent 10 }}
        volumeMounts:
        - name: jmx-config
          mountPath: /etc/jmx-zookeeper
      {{- end }}
      - name: {{ template "cp-zookeeper.name" . }}-server
        image: "{{ .Values.repository }}/{{ .Values.name }}:{{ .Values.imageTag }}"
        imagePullPolicy: "{{ .Values.imagePullPolicy }}"
        {{- if .Values.securityContext }}
        securityContext: {{- toYaml .Values.securityContext | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.clientPort }}
          name: client
        - containerPort: {{ .Values.serverPort }}
          name: server
        - containerPort: {{ .Values.leaderElectionPort }}
          name: leader-election
        {{- if .Values.prometheus.jmx.enabled }}
        - containerPort: {{ .Values.jmx.port }}
          name: jmx
        {{- end }}
        resources:
{{ toYaml .Values.resources | indent 10 }}
        env:
        - name : KAFKA_HEAP_OPTS
          value: {{ .Values.heapOptions | quote}}
        {{- if .Values.jmx.port }}
        - name : KAFKA_JMX_PORT
          value: "{{ .Values.jmx.port }}"
        {{- end }}
        - name : ZOOKEEPER_TICK_TIME
          value: "{{ .Values.tickTime }}"
        - name : ZOOKEEPER_SYNC_LIMIT
          value: "{{ .Values.syncLimit }}"
        - name : ZOOKEEPER_INIT_LIMIT
          value: "{{ .Values.initLimit }}"
        {{- if .Values.maxClientCnxns }}
        - name : ZOOKEEPER_MAX_CLIENT_CNXNS
          value: "{{ .Values.maxClientCnxns }}"
        {{- end }}
        - name: KAFKA_OPTS
          value: "{{ .Values.kafkaOptions}}"
        {{- if .Values.autoPurgeSnapRetainCount }}
        - name : ZOOKEEPER_AUTOPURGE_SNAP_RETAIN_COUNT
          value: "{{ .Values.autoPurgeSnapRetainCount}}"
        {{- end }}
        {{- if .Values.autoPurgePurgeInterval }}
        - name : ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL
          value: "{{ .Values.autoPurgePurgeInterval}}"
        {{- end }}
        - name: ZOOKEEPER_CLIENT_PORT
          value: "{{ .Values.clientPort }}"
        - name : ZOOKEEPER_SERVERS
          value: {{ template "cp-zookeeper.serverlist" . }}
        # ZOOKEEPER_SERVER_ID is required just to pass cp-zookeeper ensure script for env check,
        # the value(metadata.mame) is not used and will be overwritten in command part
        - name: ZOOKEEPER_SERVER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: TZ
          value: "{{ .Values.timezone }}"
        - name: VUNET_DOCKER_HOST
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        {{- range $key, $value := .Values.customEnv }}
        - name: {{ $key | quote }}
          value: {{ $value | quote }}
        {{- end }}
        command:
        - "bash"
        - "-c"
        - |
          ZK_FIX_HOST_REGEX="s/${HOSTNAME}\.[^:]*:/0.0.0.0:/g"
          ZOOKEEPER_SERVER_ID=$((${HOSTNAME##*-}+1)) \
          ZOOKEEPER_SERVERS=`echo $ZOOKEEPER_SERVERS | sed -e "$ZK_FIX_HOST_REGEX"` \
          /etc/confluent/docker/run
        volumeMounts:
        - name: datadir
          mountPath: /var/lib/zookeeper/data
        - name: datalogdir
          mountPath: /var/lib/zookeeper/log
      {{- if .Values.secrets.enabled }}
        - name: secretsdir
          mountPath: /etc/zookeeper/secrets
      {{- end }}
      {{- if .Values.securityContext.readOnlyRootFilesystem }}
        - name: kafka-config
          mountPath: /etc/kafka/
        - name: kafka-logs
          mountPath: /var/log/kafka
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- end }}
      volumes:
      {{ if not .Values.persistence.enabled }}
      - name: datadir
        emptyDir: {}
      - name: datalogdir
        emptyDir: {}
      {{- if .Values.secrets.enabled }}
        - name: secretsdir
          emptyDir: {}
      {{- end }}
      {{- end }}
      {{- if .Values.prometheus.jmx.enabled }}
      - name: jmx-config
        configMap:
          name: {{ template "cp-zookeeper.fullname" . }}-jmx-configmap
      {{- end }}
      {{- if .Values.securityContext.readOnlyRootFilesystem }}
      - name: kafka-config
        emptyDir: {}
      - name: kafka-logs
        emptyDir: {}  # This will create a writable directory for logs
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
{{- if .Values.secrets.enabled }}
  - metadata:
      name: secretsdir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: "{{ .Values.persistence.secretsDirSize }}"
      {{- if .Values.persistence.secretsDirStorageClass }}
      {{- if (eq "-" .Values.persistence.secretsDirStorageClass) }}
      storageClassName: ""
      {{- else }}
      storageClassName: "{{ .Values.persistence.secretsDirStorageClass }}"
      {{- end }}
      {{- end }}
  {{- end }}
  - metadata:
      name: datadir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
            {{- if $.Values.pvMapping }}
            storage: "{{ .Values.persistence.host.dataDirSize }}"
            {{- else if .Values.persistence.default.enabled }}
            storage: "{{ .Values.persistence.default.dataDirSize }}"
            {{- else if .Values.persistence.defaultReplica.enabled }}
            storage: "{{ .Values.persistence.defaultReplica.dataDirSize }}"
            {{- else if .Values.persistence.hot.enabled }}
            storage: "{{ .Values.persistence.hot.dataDirSize }}"
            {{- else if .Values.persistence.warm.enabled }}
            storage: "{{ .Values.persistence.warm.dataDirSize }}"
            {{- else if .Values.persistence.cold.enabled }}
            storage: "{{ .Values.persistence.cold.dataDirSize }}"
            {{- else if .Values.persistence.host.enabled }}
            storage: "{{ .Values.persistence.host.dataDirSize }}"
            {{- else }}
            storage: "{{ .Values.persistence.data.size }}"
            {{- end }}
      {{- if .Values.pvMapping }}
      storageClassName: local-storage
      {{- else if .Values.persistence.default.enabled }}
      storageClassName: "{{ .Values.persistence.default.storageClass }}"
      {{- else if .Values.persistence.defaultReplica.enabled }}
      storageClassName: "{{ .Values.persistence.defaultReplica.storageClass }}"
      {{- else if .Values.persistence.hot.enabled }}
      storageClassName: "{{ .Values.persistence.hot.storageClass }}"
      {{- else if .Values.persistence.warm.enabled }}
      storageClassName: "{{ .Values.persistence.warm.storageClass }}"
      {{- else if .Values.persistence.cold.enabled }}
      storageClassName: "{{ .Values.persistence.cold.storageClass }}"
      {{- else if .Values.persistence.host.enabled }}
      storageClassName: "{{ .Values.persistence.host.storageClass }}"
      {{- else if .Values.persistence.data.storageClass }}
      storageClassName: "{{ .Values.persistence.data.storageClass }}"
      {{- else }}
      storageClassName: ""
      {{- end }}

  - metadata:
      name: datalogdir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: "{{ .Values.persistence.dataLogDirSize }}"
      {{- if .Values.pvMapping }}
      storageClassName: local-storage
      {{- else }}
      storageClassName: "{{ .Values.persistence.dataLogDirStorageClass }}"
      {{- end }}
  {{- end }}

