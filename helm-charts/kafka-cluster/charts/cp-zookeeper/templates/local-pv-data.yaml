{{- $namespace := .Release.Namespace }}
{{- $replicaCount := int .Values.servers }}
{{- $prefix := "datadir-kafka-cluster-cp-zookeeper" }}
{{- $counter := 0 }}

{{- range $key, $e := .Values.pvMapping }}
  {{- if and (hasPrefix $prefix $key) (lt $counter $replicaCount) }}
    {{- $counter = add1 $counter }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ $key | default $key }}-pv
  annotations:
    helm.sh/resource-policy: keep
spec:
  capacity:
    storage: {{ $e.size }}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ $e.storageClass }}
  local:
    path: {{ $e.hostPath }}/{{ $e.dirPath }}
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - "kind-control-plane"
  claimRef:
    name: "{{ $key | default $key }}"
    namespace: {{ $namespace }}
  {{- end }}
{{- end }}

