apiVersion: v1
kind: Service
metadata:
  name: broker-headless
  labels:
    organization: vunet
    app: {{ template "cp-kafka.name" . }}
    chart: {{ template "cp-kafka.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  ports:
    - port: 8778
      name: jmx
    - port: 9092
      name: broker
  clusterIP: None
  selector:
    organization: vunet
    app: {{ template "cp-kafka.name" . }}
    release: {{ .Release.Name }}
